name: StorageType
parents:
- EnergyTechnologyType
description: 'Technology template for storage assets. Instances (StorageUnit) inherit
  shared techno-economic parameters via hasTechnology. Covers batteries, pumped hydro,
  heat storage, hydrogen caverns, and compressed air energy storage.

  Library usage ------------- Create one StorageType per storage technology class
  (e.g. "Storage.Battery.Lithium.4h") with all shared parameters. Each StorageUnit
  sets only instance-specific overrides on its Storage.DispatchView.

  '
attributes:
- id: name
  required: false
- id: energy_storage_capacity
  required: false
- id: nominal_power_capacity
  required: false
- id: charging_efficiency
  required: false
- id: discharging_efficiency
  required: false
- id: self_discharge_rate
  required: false
- id: minimum_state_of_charge
  required: false
- id: maximum_state_of_charge
  required: false
- id: maximum_required_units
  required: false
- id: minimum_required_units
  required: false
- id: unit_nominal_size
  required: false
- id: has_natural_inflow
  required: false
- id: has_active_charging
  required: false
- id: variable_operating_cost
  required: false
- id: fixed_operating_cost
  required: false
- id: investment_cost
  required: false
- id: technical_lifetime
  required: false
- id: economic_lifetime
  required: false
- id: storage_technology_type
  required: false
relations:
- id: hasCarrier
  required: false
  target: EnergyCarrier
- id: storesResource
  required: false
  target: NaturalResource
