name: ExternalSupply
parents:
- EnergyAssetInstance
description: "An external supply point that injects a single output carrier into an\
  \ EnergyBus and acts as a slack source for the modelled system.\nAn ExternalSupply\
  \ represents energy flowing into the model boundary from outside the explicitly\
  \ modelled perimeter — e.g. an import from a neighbouring market zone, a grid connection\
  \ of undefined origin, or a reference slack bus used as the angular and power balance\
  \ reference in load-flow and dispatch models.\nAs a slack source it absorbs all\
  \ power imbalances within a connected island (i.e. its injection is solved, not\
  \ fixed). The supply price attribute defines the marginal cost of this balancing\
  \ energy.\nDifferences from GenerationUnit:\n  - Capacity is optional (default:\
  \ uncapacitated).\n  - The supply is not a physical asset within the modelled system;\
  \ it\n    represents a system boundary condition.\n  - In AC power flow the connected\
  \ bus should be assigned\n    powerflow_bus_type = slack on its ElectricalBus.PowerFlowView.\n\
  \  - In optimisation the ExternalSupply.DispatchView.supply_price defines\n    the\
  \ cost of imbalance energy.\n\nOne ExternalSupply with is_slack = true should exist\
  \ per connected electrical island.\nTopological connection is expressed in SinglePort.TopologyView.atNode.\
  \ Economic parameters are expressed in ExternalSupply.DispatchView.\n"
attributes: null
relations:
- id: hasOutputCarrier
  required: false
  target: EnergyCarrier
