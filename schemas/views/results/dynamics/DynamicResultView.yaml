name: DynamicResultView
view_family: dynamic
abstract: true
parents:
- ResultView
description: >-
  Abstract base class for time-domain dynamic simulation result views
  (transient stability, contingency, frequency response). Holds scalar
  aggregate metrics and relations to Profile entities for a
  disturbance simulation's outcome — distinct from
  DispatchResultView/PowerFlowResultView, which hold steady-state
  economic-dispatch and load-flow outcomes respectively. A single
  generator can carry a DynamicResultView alongside a
  Generator.DynamicView.Subtransient (its input machine model) and a
  PowerFlowResultView (its pre-disturbance operating point), from a
  chained dispatch -> power-flow -> dynamics workflow (see
  RunRecord.hasInputRun).
attributes: null
relations:
- id: representsAsset
  required: true
- id: hasRunRecord
  required: true
  target: DynamicRunRecord
