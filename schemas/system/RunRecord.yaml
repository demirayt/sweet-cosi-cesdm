name: RunRecord
abstract: true
parents:
- SemanticEntity
description: >-
  Abstract provenance anchor for result views. Concrete subclasses
  (DispatchRunRecord, PowerFlowRunRecord, DynamicRunRecord, ...) record
  the metadata of one specific analysis run and carry domain-specific
  fields (solver name and objective value for a dispatch run;
  convergence tolerance for a power-flow run; integration method for a
  dynamics run). Every ResultView points back to the RunRecord that
  produced it via hasRunRecord, which is what allows result views from
  multiple runs — different solvers, different assumptions, different
  scenario years, different analysis domains — to coexist on the same
  asset without collision.
attributes:
- id: run_timestamp
  required: false
relations:
- id: hasInputRun
  required: false
  target: RunRecord
  description: >-
    The upstream run whose output was used as this run's input, for
    chained multi-stage workflows — e.g. a PowerFlowRunRecord pointing
    back at the DispatchRunRecord whose dispatch profile it used as
    the injection basis, or a DynamicRunRecord pointing back at the
    PowerFlowRunRecord that supplied its pre-fault steady state.
