name: DispatchRunRecord
parents:
- RunRecord
description: Records the metadata of a single dispatch optimisation run. Acts as the
  provenance anchor for all DispatchResultView entities produced by that run. Multiple
  runs on the same model produce separate DispatchRunRecord entities, allowing result
  views from different runs to coexist on the same assets.
attributes:
- id: solver_name
  required: false
- id: solver_status
  required: false
- id: objective_value
  required: false
- id: optimality_gap
  required: false
- id: solve_time_seconds
  required: false
- id: scenario_year
  required: false
- id: co2_price
  required: false
relations:
- id: hasTimestampSeries
  required: true
  target: TimestampSeries
  description: The time horizon over which the dispatch was optimised.
