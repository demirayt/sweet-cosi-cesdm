name: ElectricalBus
parents:
- NetworkNode
description: |
  A NetworkNode within an electricity CarrierDomain (AC or DC). Carries the
  nominal line-to-line voltage of the network level at this node. Used for power
  flow, unit commitment, and optimal power flow analyses in electricity transmission
  and distribution models.

  Examples: a 380 kV transmission busbar, a 110 kV substation busbar, a 20 kV
  distribution feeder node.

attributes:
- id: nominal_voltage
  required: false
relations: null
