attributes:
  annual_energy_demand:
    description: The total amount of energy required by the load over an entire year,
      expressed in MWh/year. It is used to scale demand time series or to validate
      consumption totals for modelling scenarios.
    label: Annual Energy Demand
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - MWh/year
  maximum_energy_demand:
    description: Maximum energy demand by the load over an entire year,
      expressed in MW. 
    label: Maximum Energy Demand
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - MW
  demand_type:
    description: >
      Type of the specific demand. NOTE: this description is currently
      too thin to confidently document a recommended vocabulary —
      it's unclear from context alone whether this is meant to
      classify demand by sector (e.g. "residential", "industrial"),
      by flexibility behavior (e.g. "shiftable", "curtailable",
      "fixed"), or something else, and it has zero usages across this
      toolbox's examples/tests to disambiguate from. Needs input from
      whoever authored demand_flex.yaml before a real enum or
      controlled vocabulary can be added here in good faith.
    label: Type of the specific demand
    provenance_ref: Define the provenance here.
    value:
      type: string
  flexibility_time_resolution:
    description: The smallest allowable time granularity for shifting, adjusting,
      or rescheduling the load demand. Typically corresponds to the dispatch interval
      (e.g., 15 min, 1 h).
    label: Flexibility Time Resolution
    provenance_ref: Define the provenance here.
    value:
      type: number
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - h
        - min
  flexibility_window_time_end:
    description: The end of the time interval during which flexibility actions are
      permitted. Outside this window the demand must strictly follow its profile.
    label: Flexibility Window Time End
    provenance_ref: Define the provenance here.
    value:
      type: number
    unit:
      constraints:
        enum:
        - Timestamp / time index
  flexibility_window_time_start:
    description: The beginning of the time interval during which the load is allowed
      to shift or modify its consumption, expressed as a timestamp or model time index.
    label: Flexibility WindowTime Start
    provenance_ref: Define the provenance here.
    value:
      type: number
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - Timestamp / time index
  is_demand_flexible:
    description: Boolean indicator specifying whether the load can be shifted, curtailed,
      rescheduled, or otherwise managed during operation. If false, demand must be
      met as defined by the demand profile.
    label: Is demand Flexible
    provenance_ref: Define the provenance here.
    value:
      type: boolean
  maximum_downward_adjustment:
    description: The maximum allowable reduction from the nominal load, expressed
      in kW or MW. Represents demand reduction, curtailment potential, or flexibility
      for load shedding.
    label: Maximum Downward Adjustment
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - kW
        - MW
  maximum_upward_adjustment:
    description: The maximum amount of incremental upward deviation from the nominal
      load that is allowed at any given time, expressed in kW or MW. Represents demand
      increase or load activation flexibility.
    label: Maximum Upward Adjustment
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - kW
        - MW
  active_power_demand:
    description: >
      The instantaneous active power consumed by the demand entity.
      Active power represents the real electrical power required to
      perform useful work and is typically expressed in MW.

    label: Active Power Demand

    provenance_ref: Define the provenance here.

    value:
      type: decimal
      constraints:
        minimum: 0.0

    unit:
      constraints:
        enum:
          - MW


  reactive_power_demand:
    description: >
      The instantaneous reactive power consumed by the demand entity.
      Reactive power represents the non-working power required for
      maintaining electric and magnetic fields in AC systems and is
      typically expressed in MVAr.

    label: Reactive Power Demand

    provenance_ref: Define the provenance here.

    value:
      type: decimal
      constraints:
        minimum: 0.0

    unit:
      constraints:
        enum:
          - MVAr


  power_factor:
    description: >
      Ratio between active power and apparent power associated with
      the demand entity. The power factor characterizes the efficiency
      of electrical power utilization and indicates the phase shift
      between voltage and current in AC systems.

    label: Power Factor

    provenance_ref: Define the provenance here.

    value:
      type: decimal
      constraints:
        minimum: 0.0
        maximum: 1.0

    unit:
      constraints:
        enum:
          - pu
