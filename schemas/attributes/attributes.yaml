attributes:
  id:
    description: Unique identifier used to reference and distinguish the entity within
      the system model.
    comment: Unique identifier of the entity.
    label: Identifier
    provenance_ref: Define the provenance here.
    value:
      type: string
  name:
    comment: Descriptive name.
    label: Name
    description: Descriptive name.
    provenance_ref: Define the provenance here.
    value:
      type: string
  long_name:
    comment: Long description
    label: Long Name
    description: Long description
    provenance_ref: Define the provenance here.
    value:
      type: string
  description:
    comment: Human-readable explanation of the entity.
    label: Description
    description: Textual description providing additional semantic, contextual, or
      explanatory information about the entity.
    provenance_ref: Define the provenance here.
    value:
      type: string
  comment:
    description: Optional comment/notes.
    label: Comment
    provenance_ref: Define the provenance here.
    value:
      type: string
  base_mva:
    label: base_mva
    description: 'The system-wide apparent power base used for per-unit calculations.
      All per-unit quantities are referenced to this base power.

      '
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - MW
  annual_resource_potential:
    description: 'Specifies the total annually available quantity of a resource or
      carrier that can be utilized, harvested, extracted, or converted by the represented
      entity under the assumptions of the associated scenario or resource representation.

      '
    label: Annual Resource Potential
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - MWh/year
  commission_date:
    description: The date when the generator was first commissioned and became operational.
      Used for lifecycle, availability, and depreciation modeling.
    label: Commission Date
    provenance_ref: Define the provenance here.
    value:
      type: dateTime
    unit:
      constraints:
        enum:
        - date
  retirement_date:
    description: Planned or actual date when the generator is permanently retired
      from service. Used for asset replacement planning and system expansion studies.
    label: Retirement Date
    provenance_ref: Define the provenance here.
    value:
      type: dateTime
    unit:
      constraints:
        enum:
        - date
  retrofit_date:
    description: Date of major upgrade or efficiency retrofit. Impacts operational
      efficiency, lifetime extension, and emission calculations.
    label: Retrofit Date
    provenance_ref: Define the provenance here.
    value:
      type: dateTime
    unit:
      constraints:
        enum:
        - date
  maximum_ramp_rate_down:
    description: "The maximum percentage decrease in output power per unit time during\
      \ ramp-down operations (charging or discharging). Expressed as %/min or %/s,\
      \ capturing the system\u2019s downward flexibility."
    label: Maximum Ramp Rate Down
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - '%/h'
  maximum_ramp_rate_up:
    description: The maximum increase in output power per unit time during discharging,
      typically expressed in kW/s or MW/min. Represents the upward flexibility of
      the storage device.
    label: Maximum Ramp Rate Up
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - '%/h'
  minimum_down_time:
    description: 'Minimum number of hours a unit must remain offline after shutdown.
      Used in unit commitment models.

      '
    label: Minimum Down Time
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - h
  minimum_up_time:
    description: 'Minimum number of hours a unit must remain online once started.
      Used in unit commitment models.

      '
    label: Minimum Up Time
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - h
  initial_state_of_charge:
    description: Initial state of charge at the beginning of the optimization horizon,
      expressed as a fraction between 0 and 1.
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
        maximum: 1.0
    unit:
      constraints:
        enum:
        - fraction
  maximum_state_of_charge:
    description: Maximum allowed state of charge, usually expressed as a fraction
      between 0 and 1.
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
        maximum: 1.0
    unit:
      constraints:
        enum:
        - fraction
  minimum_state_of_charge:
    description: Minimum allowed state of charge, usually expressed as a fraction
      between 0 and 1
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
        maximum: 1.0
    unit:
      constraints:
        enum:
        - fraction
  self_discharge_rate:
    description: Fraction of stored energy lost per time step due to self-discharge.
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - fraction
  reservoir_volume:
    description: Current stored water volume or equivalent stored water potential
      within the reservoir.
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - m3
        - hm3
        - GWh
        - TWh
  minimum_reservoir_volume:
    description: Minimum allowable reservoir storage volume maintained for operational,
      environmental, or technical constraints.
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - m3
        - hm3
        - GWh
        - TWh
  maximum_reservoir_volume:
    description: Maximum allowable reservoir storage volume or storage capacity.
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - m3
        - hm3
        - GWh
        - TWh
  latitude:
    description: 'Geographical latitude of the entity, expressed in decimal degrees.
      Used for spatial modelling, renewable resource assessment, and GIS-based visualisation.

      '
    label: Latitude
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: -90.0
        maximum: 90.0
    unit:
      constraints:
        enum:
        - deg
  longitude:
    description: 'Geographical longitude of the entity, expressed in decimal degrees.
      Used for spatial modelling, renewable resource assessment, and GIS-based visualisation.

      '
    label: Longitude
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: -180.0
        maximum: 180.0
    unit:
      constraints:
        enum:
        - deg
  elevation:
    description: 'Elevation of the entity above mean sea level, expressed in metres.
      Relevant for climate-adjusted performance modelling and topographic network
      studies.

      '
    label: Elevation
    provenance_ref: Define the provenance here.
    value:
      type: decimal
    unit:
      constraints:
        enum:
        - m
  nominal_voltage:
    description: 'Rated line-to-line voltage of the network node or branch under normal
      operating conditions, expressed in kV.

      '
    label: Nominal Voltage
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - kV
  powerflow_bus_type:
    label: Power Flow Bus Type
    description: "Specifies which electrical quantities are held fixed (specified)\
      \ and which are computed (solved) at this bus in an AC load-flow or optimal\
      \ power flow analysis.\n\n  slack  \u2014 Voltage magnitude and angle are specified\
      \ (V, \u03B8 fixed).\n           Active and reactive power injections are solved.\n\
      \           Exactly one slack bus per connected island is required\n       \
      \    as the system angle reference. Also called swing bus or\n           reference\
      \ bus.\n\n  PV     \u2014 Active power injection and voltage magnitude are specified\n\
      \           (P, V fixed). Reactive power and voltage angle are solved.\n   \
      \        Typically assigned to generator buses where voltage is\n          \
      \ regulated by an AVR. Also called generator bus or\n           voltage-controlled\
      \ bus.\n\n  PQ     \u2014 Active and reactive power injections are specified\
      \ (P, Q\n           fixed). Voltage magnitude and angle are solved. Typically\n\
      \           assigned to load buses and passive network nodes.\n           Also\
      \ called load bus.\n\nThis attribute belongs on ElectricalBus.PowerFlowView,\
      \ not on ElectricalBus directly, because bus type is analysis-context-specific:\
      \ the same physical bus may be modelled as PV in one study and PQ in another\
      \ (e.g. when a generator is on forced outage).\n"
    provenance_ref: 'IEEE Std 399-1997 (Brown Book), Section 7; MATPOWER User''s Manual,
      Table B-1; PSS/E Program Operation Manual, Bus Data.

      '
    value:
      type: string
      constraints:
        enum:
        - slack
        - PV
        - PQ
  HVDC_p_set:
    label: HVDC scheduled active power setpoint
    description: 'Scheduled active power transfer setpoint [MW], positive = flow from
      fromNode to toNode.  The actual injected power may differ from the setpoint
      due to losses.

      '
    value:
      type: decimal
    unit:
      constraints:
        enum:
        - MW
  HVDC_p_max_1_to_2:
    label: "HVDC maximum power flow (from\u2192to)"
    description: 'Maximum active power flow from fromNode to toNode [MW]. Determined
      by the smaller of the two converter station ratings.

      '
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - MW
  HVDC_p_max_2_to_1:
    label: "HVDC maximum power flow (to\u2192from)"
    description: 'Maximum active power flow from toNode to fromNode [MW]. May differ
      from HVDC_p_max_1_to_2 for asymmetric links.

      '
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - MW
  HVDC_loss_coefficient:
    label: HVDC converter loss coefficient
    description: 'Fractional converter losses as a proportion of transferred active
      power (dimensionless).  A value of 0.014 means 1.4 % losses. Covers both converter
      station losses and DC cable resistive losses.

      '
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - pu
  HVDC_dc_voltage:
    label: HVDC DC pole-to-pole voltage
    description: 'Nominal DC pole-to-pole voltage of the link [kV]. Used to derive
      DC cable current and resistive losses.

      '
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - kV
  HVDC_LCC_firing_angle_rectifier:
    label: LCC firing angle at rectifier
    description: "Firing angle \u03B1 at the rectifier (sending) converter station\
      \ [degrees]. Typical range 10\u201320\xB0 in normal operation.\n"
    value:
      type: decimal
    unit:
      constraints:
        enum:
        - deg
  HVDC_LCC_extinction_angle_inverter:
    label: LCC extinction angle at inverter
    description: "Minimum extinction angle \u03B3 at the inverter (receiving) converter\
      \ station [degrees].  Minimum value ~15\u201318\xB0 to prevent commutation failure.\n"
    value:
      type: decimal
    unit:
      constraints:
        enum:
        - deg
  HVDC_LCC_q_absorbed_from:
    label: LCC reactive power absorbed at from end
    description: 'Reactive power absorbed by the LCC converter at the fromNode converter
      station [MVAr].  Always positive (absorbing).

      '
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - MVAr
  HVDC_LCC_q_absorbed_to:
    label: LCC reactive power absorbed at to end
    description: 'Reactive power absorbed by the LCC converter at the toNode converter
      station [MVAr].  Always positive (absorbing).

      '
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - MVAr
  HVDC_VSC_q_min_from:
    label: VSC minimum reactive power at from end
    description: 'Minimum reactive power output at the fromNode converter station
      [MVAr]. Negative = absorbing reactive power (capacitive loading).

      '
    value:
      type: decimal
    unit:
      constraints:
        enum:
        - MVAr
  HVDC_VSC_q_max_from:
    label: VSC maximum reactive power at from end
    description: 'Maximum reactive power output at the fromNode converter station
      [MVAr]. Positive = injecting reactive power (inductive support).

      '
    value:
      type: decimal
    unit:
      constraints:
        enum:
        - MVAr
  HVDC_VSC_q_min_to:
    label: VSC minimum reactive power at to end
    description: 'Minimum reactive power output at the toNode converter station [MVAr].

      '
    value:
      type: decimal
    unit:
      constraints:
        enum:
        - MVAr
  HVDC_VSC_q_max_to:
    label: VSC maximum reactive power at to end
    description: 'Maximum reactive power output at the toNode converter station [MVAr].

      '
    value:
      type: decimal
    unit:
      constraints:
        enum:
        - MVAr
  max_flow:
    description: 'Maximum carrier flow permitted through a branch or interconnector
      without violating operational limits, expressed in MW (power) or the appropriate
      flow unit for the carrier.

      '
    label: Maximum Flow
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - MW
  maximum_power_flow_from_to:
    description: 'Maximum power flow in the direction from node 1 to node 2, used
      for asymmetric capacity limits (e.g., NTC interconnectors).

      '
    label: "Maximum Power Flow (1\u21922)"
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - MW
  maximum_power_flow_to_from:
    description: 'Maximum power flow in the direction from node 2 to node 1, used
      for asymmetric capacity limits (e.g., NTC interconnectors).

      '
    label: "Maximum Power Flow (2\u21921)"
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - MW
  series_resistance_per_km:
    description: Series resistance of the branch per unit length. This is the real
      component of the series impedance and represents resistive conductor losses,
      expressed in ohm per kilometre (Ohm/km).
    label: Series Resistance
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - Ohm/km
  series_reactance_per_km:
    description: Series reactance of the branch per unit length. This is the imaginary
      component of the series impedance and represents inductive behaviour relevant
      for power-flow and voltage calculations, expressed in ohm per kilometre (Ohm/km).
    label: Series Reactance
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - Ohm/km
  shunt_susceptance_per_km:
    description: Shunt susceptance of the branch per unit length. This is the imaginary
      component of the shunt admittance, not the shunt capacitance. It represents
      capacitive charging behaviour and is expressed in micro-siemens per kilometre
      (microS/km).
    label: Shunt Susceptance
    provenance_ref: Define the provenance here.
    value:
      type: decimal
    unit:
      constraints:
        enum:
        - microS/km
  thermal_capacity_rating:
    description: 'Maximum continuous apparent power the branch can carry without exceeding
      thermal limits, expressed in MVA.

      '
    label: Thermal Capacity Rating
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - MVA
  line_length:
    description: 'Physical length of the transmission or pipeline element, expressed
      in kilometres. Used to scale per-unit-length electrical or hydraulic parameters.

      '
    label: Line Length
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - km
  parallel_circuit_count:
    description: 'Number of identical circuits run in parallel between the same endpoints.
      Increases total capacity and reduces effective impedance.

      '
    label: Parallel Circuit Count
    provenance_ref: Define the provenance here.
    value:
      type: integer
  from_switch_closed:
    description: 'Boolean indicating whether the breaker at the from-end of the branch
      is closed (true = connected, false = disconnected). Used in contingency and
      outage modelling.

      '
    label: From Switch Closed
    provenance_ref: Define the provenance here.
    value:
      type: boolean
  to_switch_closed:
    description: 'Boolean indicating whether the breaker at the to-end of the branch
      is closed (true = connected, false = disconnected). Used in contingency and
      outage modelling.

      '
    label: To Switch Closed
    provenance_ref: Define the provenance here.
    value:
      type: boolean
  energy_storage_capacity:
    description: 'Maximum net energy or storage medium volume that can be stored and
      subsequently released under defined operating conditions, expressed as the difference
      between maximum and minimum allowable state of charge. Use MWh for energy-equivalent
      storage models and m3 for reservoir water-volume models.

      '
    label: Energy Storage Capacity
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - MWh
        - m3
  charging_variable_operating_cost:
    description: 'Marginal cost incurred per MWh of energy absorbed during the charging
      process, expressed in MU/MWh.

      '
    label: Charging Variable Operating Cost
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - MU/MWh
  maximum_charging_power:
    description: 'Upper limit on instantaneous power intake during charging, constrained
      by converter size and thermal limits (MW).

      '
    label: Maximum Charging Power
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - MW
  maximum_required_units:
    description: 'Maximum number of discrete technology units that may be installed,
      representing site or policy constraints on deployment.

      '
    label: Maximum Required Units
    provenance_ref: Define the provenance here.
    value:
      type: integer
    unit:
      constraints:
        enum:
        - unit
  minimum_required_units:
    description: 'Minimum number of discrete technology units that must be installed,
      representing modular build constraints or policy minimums.

      '
    label: Minimum Required Units
    provenance_ref: Define the provenance here.
    value:
      type: integer
    unit:
      constraints:
        enum:
        - unit
  unit_nominal_size:
    description: 'Nominal capacity of a single technology unit (MW or MWh depending
      on type). Combined with minimum/maximum required units to define total installable
      capacity range.

      '
    label: Unit Nominal Size
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - MW
        - MWh
  technical_lifetime:
    description: Technical lifetime of the asset in years.
    label: Technical Lifetime
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - years
  dispatch_type:
    description: "Dispatch classification of a generation technology:\n  \"dispatchable\"\
      \    \u2014 operator can choose output (thermal, hydro reservoir)\n  \"nondispatchable\"\
      \ \u2014 output bounded by external resource (wind, solar, RoR)\n  \"must_run\"\
      \        \u2014 must generate at minimum level (nuclear baseload, CHP)\n"
    label: Dispatch Type
    provenance_ref: Define the provenance here.
    value:
      type: string
      constraints:
        enum:
        - dispatchable
        - nondispatchable
        - must_run
  start_datetime:
    description: 'ISO 8601 datetime string marking the first timestep of the series
      (e.g. "2009-01-01T00:00:00"). Combined with resolution and length this fully
      defines the time axis without storing the full array.

      '
    label: Start Datetime
    provenance_ref: Define the provenance here.
    value:
      type: string
  resolution:
    description: 'ISO 8601 duration string defining the uniform step size between
      consecutive timesteps (e.g. "PT1H" for hourly, "PT15M" for quarter-hourly, "P1D"
      for daily). All timesteps within one TimestampSeries are assumed to have equal
      duration.

      '
    label: Resolution
    provenance_ref: Define the provenance here.
    value:
      type: string
  length:
    description: 'Total number of timesteps in the series. Must equal the length of
      the values array stored in the HDF5 file for every Profile that references this
      TimestampSeries.

      '
    label: Length
    provenance_ref: Define the provenance here.
    value:
      type: integer
      constraints:
        minimum: 1
  timezone:
    description: 'IANA timezone identifier for the series (e.g. "UTC", "Europe/Zurich").
      Used when converting between local time and epoch timestamps. Defaults to UTC
      if not specified.

      '
    label: Timezone
    provenance_ref: Define the provenance here.
    value:
      type: string
  profile_type:
    description: "Specifies how the numeric values stored in the HDF5 payload should\
      \ be interpreted when applied to an asset:\n  as_SI                        \u2014\
      \ absolute SI unit values (use directly).\n  as_capacity_factor           \u2014\
      \ dimensionless [0,1] fractions;\n                                 multiply\
      \ by nominal_power_capacity.\n  as_normalized_annual_energy  \u2014 dimensionless\
      \ fractions summing to 1;\n                                 multiply by annual_energy_demand\
      \ or\n                                 annual_resource_potential.\n"
    label: Profile Type
    provenance_ref: Define the provenance here.
    value:
      type: string
      constraints:
        enum:
        - as_SI
        - as_capacity_factor
        - as_normalized_annual_energy
  profile_unit:
    description: 'SI unit of the profile values. Only meaningful for as_SI profiles
      (e.g. "MW", "MWh", "m3/s"). Dimensionless profiles (capacity factor and normalized
      annual energy) should leave this blank or set it to "pu" (per unit).

      '
    label: Profile Unit
    provenance_ref: Define the provenance here.
    value:
      type: string
  data_reference:
    description: 'Internal HDF5 path identifying the numeric payload for this profile,
      formatted as "/profiles/<entity_id>" (e.g. "/profiles/profile.demand.electricity.at00").
      The values dataset at this path contains a float64 array of length equal to
      the referenced TimestampSeries length. This attribute is the bridge between
      the YAML entity store and the HDF5 data store.

      '
    label: Data Reference
    provenance_ref: Define the provenance here.
    value:
      type: string
  has_natural_inflow:
    description: 'Indicates whether this storage technology type receives a natural
      inflow of the stored carrier from an external source (e.g. rainfall into a reservoir,
      river inflow into a pumped-hydro open-loop system). When true, the associated
      Storage.DispatchView should carry an annual_natural_inflow_energy and natural_inflow_profile_reference.
      Mutually exclusive storage technologies (batteries, closed-loop pumped hydro)
      set this to false.

      '
    label: Has Natural Inflow
    provenance_ref: Define the provenance here.
    value:
      type: boolean
  has_active_charging:
    description: 'Indicates whether this storage technology type can be actively charged
      by withdrawing carrier from the connected Bus (e.g. pumping water uphill, charging
      a battery from the grid). Technologies whose energy input is purely from natural
      inflow (gravity-fed reservoirs, pondage) set this to false.

      '
    label: Has Active Charging
    provenance_ref: Define the provenance here.
    value:
      type: boolean
  annual_natural_inflow_energy:
    description: 'Total natural inflow received by a storage asset over one year.
      Used as the scaling factor when converting a normalised inflow profile (as_normalized_annual_energy)
      to absolute hourly inflow values in dispatch optimisation models.

      '
    label: Annual Natural Inflow as energy
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - MWh/year
  nominal_pressure:
    description: 'Nominal operating pressure at a gas, hydrogen, or water Bus, expressed
      in bar (gauge). Defines the reference pressure level of the carrier domain at
      this node and is used for hydraulic network calculations and compressor/pump
      modelling.

      '
    label: Nominal Pressure
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - bar
  nominal_temperature:
    description: 'Nominal supply temperature at a heat network Bus, expressed in degrees
      Celsius. Defines the reference temperature of the heat carrier at this node
      and is used for thermal network flow calculations and heat exchanger modelling.

      '
    label: Nominal Temperature
    provenance_ref: Define the provenance here.
    value:
      type: decimal
    unit:
      constraints:
        enum:
        - degC
  nominal_head:
    description: 'Nominal hydraulic head at a water network Bus, expressed in metres.
      Represents the total energy per unit weight of water at this node (elevation
      + pressure head) and is used for hydraulic network calculations.

      '
    label: Nominal Head
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - m
  rated_primary_voltage:
    description: 'Rated line-to-line voltage on the primary (high-voltage) winding
      of a power transformer, expressed in kV. Used to define the voltage transformation
      ratio and for per-unit system normalisation in power flow calculations.

      '
    label: Rated Primary Voltage
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - kV
  rated_secondary_voltage:
    description: 'Rated line-to-line voltage on the secondary (low-voltage) winding
      of a power transformer, expressed in kV. Combined with rated_primary_voltage
      this defines the nominal transformation ratio.

      '
    label: Rated Secondary Voltage
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - kV
  short_circuit_voltage_in_percentage:
    description: 'Short-circuit voltage of a transformer expressed as a percentage
      of rated voltage (%). Determines the transformer''s series reactance in per-unit:
      x_pu = short_circuit_voltage_in_percentage / 100. Used directly in power flow
      and fault analysis calculations.

      '
    label: Short Circuit Voltage
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - '%'
  tap_ratio:
    description: Off-nominal transformer tap ratio. In MATPOWER, a value of 0 or 1
      indicates no off-nominal tap; values different from 1 represent transformer
      branch behaviour.
    label: Tap Ratio
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
  phase_shift_angle:
    description: Transformer phase-shift angle in degrees. Maps to the MATPOWER branch
      angle column and pandapower transformer shift_degree where applicable.
    label: Phase Shift Angle
    provenance_ref: Define the provenance here.
    value:
      type: decimal
    unit:
      constraints:
        enum:
        - deg
  storage_technology_type:
    description: >
      Technology sub-type of a storage asset. Intentionally
      open/extensible (not a closed enum) — the FlexEco importer
      (tools/import_flexeco.py) consumes this as a soft pass-through
      string, not matched against a fixed set, so a hard enum here
      would risk rejecting legitimate values that routing code already
      handles generically. New values should follow the existing
      snake_case convention. Recommended starting vocabulary: "hydro",
      "phs" (pumped-hydro storage), "battery". Used to route to the
      correct FlexEco storage class.
    label: Storage Technology Type
    provenance_ref: Define the provenance here.
    value:
      type: string
  economic_lifetime:
    description: Economic/depreciation lifetime of the asset in years.
    label: Economic Lifetime
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - years
  co2_emission_factor:
    description: "Direct CO\u2082 emissions per unit of electrical output [tCO\u2082\
      \ / MWh_el]. For fuel-based generators this is fuel_co2_intensity / efficiency.\n"
    label: CO2 Emission Factor
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - tCO2/MWh
  fuel_consumption_rate:
    description: 'Fuel input per unit of electrical output [MWh_fuel / MWh_el], equal
      to 1 / energy_conversion_efficiency.

      '
    label: Fuel Consumption Rate
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
  total_generation:
    description: Total energy generated over the optimisation horizon [MWh].
    label: Total Generation
    value:
      type: decimal
      minimum: 0.0
    unit:
      constraints:
        enum:
        - MWh
  total_discharge_energy:
    description: Total energy discharged from storage over the horizon [MWh].
    label: Total Discharge Energy
    value:
      type: decimal
      minimum: 0.0
    unit:
      constraints:
        enum:
        - MWh
  total_charge_energy:
    description: Total energy charged into storage over the horizon [MWh].
    label: Total Charge Energy
    value:
      type: decimal
      minimum: 0.0
    unit:
      constraints:
        enum:
        - MWh
  total_served_energy:
    description: Total energy actually served to demand over the horizon [MWh].
    label: Total Served Energy
    value:
      type: decimal
      minimum: 0.0
    unit:
      constraints:
        enum:
        - MWh
  total_curtailed_energy:
    description: Total unserved energy (curtailed demand) over the horizon [MWh].
    label: Total Curtailed Energy
    value:
      type: decimal
      minimum: 0.0
    unit:
      constraints:
        enum:
        - MWh
  curtailment_rate:
    description: 'Fraction of demanded energy that was curtailed. curtailed_energy
      / total_demanded_energy [-].

      '
    label: Curtailment Rate
    value:
      type: decimal
      minimum: 0.0
      maximum: 1.0
  capacity_factor:
    description: 'Ratio of actual generation to maximum possible generation over the
      horizon. sum(p(t)) / (P_max * T) [-].

      '
    label: Capacity Factor
    value:
      type: decimal
      minimum: 0.0
      maximum: 1.0
  full_load_hours:
    description: 'Equivalent full-load hours of operation. total_generation / nominal_power_capacity
      [h].

      '
    label: Full Load Hours
    value:
      type: decimal
      minimum: 0.0
    unit:
      constraints:
        enum:
        - h
  storage_cycles:
    description: 'Number of equivalent full charge/discharge cycles completed over
      the optimisation horizon [-].

      '
    label: Storage Cycles
    value:
      type: decimal
      minimum: 0.0
  average_round_trip_efficiency:
    description: 'Realised round-trip efficiency over the horizon: total_discharge
      / total_charge [-].

      '
    label: Average Round-Trip Efficiency
    value:
      type: decimal
      minimum: 0.0
      maximum: 1.0
  total_flow_1_to_2:
    description: "Total energy flow in the 1\u21922 direction over the horizon [MWh]."
    label: Total Flow 1 to 2
    value:
      type: decimal
    unit:
      constraints:
        enum:
        - MWh
  total_flow_2_to_1:
    description: "Total energy flow in the 2\u21921 direction over the horizon [MWh]."
    label: Total Flow 2 to 1
    value:
      type: decimal
    unit:
      constraints:
        enum:
        - MWh
  congestion_hours:
    description: Number of hours the line/interconnector was at its thermal limit.
    label: Congestion Hours
    value:
      type: integer
      minimum: 0
    unit:
      constraints:
        enum:
        - h
  total_congestion_rent:
    description: "Total congestion rent collected over the horizon (shadow price \xD7\
      \ flow) [MU].\n"
    label: Total Congestion Rent
    value:
      type: decimal
    unit:
      constraints:
        enum:
        - MU
  total_variable_cost:
    description: Total variable operating cost over the horizon [MU].
    label: Total Variable Cost
    value:
      type: decimal
      minimum: 0.0
    unit:
      constraints:
        enum:
        - MU
  total_start_cost:
    description: Total startup cost over the horizon [MU].
    label: Total Start Cost
    value:
      type: decimal
      minimum: 0.0
    unit:
      constraints:
        enum:
        - MU
  co2_emissions:
    description: 'Total CO2 emissions over the horizon [tCO2]. sum(p(t) * dt * emission_factor).

      '
    label: CO2 Emissions
    value:
      type: decimal
      minimum: 0.0
    unit:
      constraints:
        enum:
        - tCO2
  average_nodal_price:
    description: Time-weighted average nodal electricity price [MU/MWh].
    label: Average Nodal Price
    value:
      type: decimal
    unit:
      constraints:
        enum:
        - MU/MWh
  min_nodal_price:
    description: Minimum nodal electricity price over the horizon [MU/MWh].
    label: Minimum Nodal Price
    value:
      type: decimal
    unit:
      constraints:
        enum:
        - MU/MWh
  max_nodal_price:
    description: Maximum nodal electricity price over the horizon [MU/MWh].
    label: Maximum Nodal Price
    value:
      type: decimal
    unit:
      constraints:
        enum:
        - MU/MWh
  objective_value:
    description: Total system cost (objective function value) [MU].
    label: Objective Value
    value:
      type: decimal
    unit:
      constraints:
        enum:
        - MU
  optimality_gap:
    description: 'Relative MIP gap at solver termination. (UB - LB) / UB [-].

      '
    label: Optimality Gap
    value:
      type: decimal
      minimum: 0.0
  solve_time_seconds:
    description: Wall-clock solver time in seconds.
    label: Solve Time
    value:
      type: decimal
      minimum: 0.0
    unit:
      constraints:
        enum:
        - s
  solver_name:
    description: Name of the solver used (e.g. HiGHS, Gurobi, CPLEX).
    label: Solver Name
    value:
      type: string
  solver_status:
    description: Solver termination status.
    label: Solver Status
    value:
      type: string
      constraints:
        enum:
        - optimal
        - suboptimal
        - infeasible
        - timeout
        - unknown
  scenario_year:
    description: Planning or operational reference year of the scenario.
    label: Scenario Year
    value:
      type: integer
  run_timestamp:
    description: ISO-8601 datetime when this optimisation run was executed.
    label: Run Timestamp
    value:
      type: datetime
  port_direction:
    description: "Flow direction at a ConversionPort.\n  input        \u2014 carrier\
      \ is consumed/withdrawn at this port\n  output       \u2014 carrier is produced/injected\
      \ at this port\n  bidirectional \u2014 carrier can flow in either direction\n\
      \                  (e.g. reversible heat pump, V2G)\n"
    label: Port Direction
    value:
      type: string
      constraints:
        enum:
        - input
        - output
        - bidirectional
  flow_coefficient:
    description: "Ratio of this port's flow to the reference port's flow, expressed\
      \ as a signed fraction. The reference port has flow_coefficient = 1.0 by definition.\n\
      Sign convention (consistent with bus injection notation):\n  positive \u2014\
      \ carrier is injected into the connected Bus (output port)\n  negative \u2014\
      \ carrier is withdrawn from the connected Bus (input port)\n\nExamples for a\
      \ CHP with H2 reference input:\n  port.FC_1.h2_in    flow_coefficient = -1.00\
      \  (consumes 1 MW H2)\n  port.FC_1.elec_out flow_coefficient =  0.55  (produces\
      \ 0.55 MW elec)\n  port.FC_1.heat_out flow_coefficient =  0.30  (produces 0.30\
      \ MW heat)\n"
    label: Flow Coefficient
    value:
      type: decimal
  is_reference_port:
    description: 'True if this ConversionPort is the reference port for the unit''s
      flow_coefficient scale. Exactly one port per ConversionUnit must have is_reference_port
      = true. The reference port is typically the primary fuel or energy input.

      '
    label: Is Reference Port
    value:
      type: boolean
  minimum_flow_fraction:
    description: "Minimum allowed flow at this port as a fraction of the product flow_coefficient\
      \ \xD7 reference_port_flow. Used to express minimum part-load ratios or technical\
      \ minimum generation constraints at the port level.\n"
    label: Minimum Flow Fraction
    value:
      type: decimal
      constraints:
        minimum: 0.0
  maximum_flow_fraction:
    description: "Maximum allowed flow at this port as a fraction of the product flow_coefficient\
      \ \xD7 reference_port_flow. Values greater than 1.0 express short-term overload\
      \ capability beyond the rated coefficient.\n"
    label: Maximum Flow Fraction
    value:
      type: decimal
      constraints:
        minimum: 0.0
  maximum_output_power:
    description: 'Maximum output power or output flow capacity of this ConversionPort.
      This attribute is intended for ports with port_direction = output or bidirectional.
      It represents the carrier-specific output limit at the port level, e.g. maximum
      electrical output of an electricity port or maximum thermal output of a heat
      port.

      The attribute belongs to ConversionPort rather than Conversion.DispatchView
      because different output ports of the same ConversionUnit can have different
      capacities and carrier domains.

      '
    label: Maximum Output Power
    value:
      type: decimal
      constraints:
        minimum: 0.0
  hvdc_technology_type:
    label: HVDC Technology Type
    description: "Technology variant of the HVDC converter station.\n  LCC \u2014\
      \ Line Commutated Converter (thyristor-based, classic HVDC).\n  VSC \u2014 Voltage\
      \ Source Converter (IGBT-based, modern HVDC).\n"
    value:
      type: string
      constraints:
        enum:
        - LCC
        - VSC
  dc_voltage_kv:
    label: DC Voltage [kV]
    description: Nominal DC pole-to-pole voltage of the HVDC link [kV].
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - kV
  active_power_setpoint_from_to:
    label: Scheduled Active Power [MW]
    description: "Operator-set active power transfer on the HVDC link [MW]. Positive\
      \ = fromNode \u2192 toNode.\n"
    value:
      type: decimal
    unit:
      constraints:
        enum:
        - MW
  p_max_hvdc:
    label: P max HVDC [MW]
    description: "Maximum active power, fromNode \u2192 toNode [MW]."
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - MW
  p_min_hvdc:
    label: P min HVDC [MW]
    description: Minimum active power [MW]. Negative = reverse direction allowed.
    value:
      type: decimal
    unit:
      constraints:
        enum:
        - MW
  converter_loss_coefficient:
    label: Converter Loss Coefficient
    description: Fractional converter losses as proportion of transferred power [pu].
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - pu
  converter_rating_from:
    label: Converter Rating fromNode [MVA]
    description: Apparent power rating of the converter station at the fromNode end.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - MVA
  converter_rating_to:
    label: Converter Rating toNode [MVA]
    description: Apparent power rating of the converter station at the toNode end.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - MVA
  q_max_from:
    label: Q max fromNode [MVAr]
    description: Maximum reactive power injection at fromNode converter (VSC only).
    value:
      type: decimal
    unit:
      constraints:
        enum:
        - MVAr
  q_min_from:
    label: Q min fromNode [MVAr]
    description: Minimum reactive power at fromNode converter (VSC only).
    value:
      type: decimal
    unit:
      constraints:
        enum:
        - MVAr
  q_max_to:
    label: Q max toNode [MVAr]
    description: Maximum reactive power injection at toNode converter (VSC only).
    value:
      type: decimal
    unit:
      constraints:
        enum:
        - MVAr
  q_min_to:
    label: Q min toNode [MVAr]
    description: Minimum reactive power at toNode converter (VSC only).
    value:
      type: decimal
    unit:
      constraints:
        enum:
        - MVAr
  firing_angle_min:
    label: Minimum Firing Angle [degrees]
    description: Minimum thyristor firing angle (LCC only).
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - deg
  reactive_power_absorption_factor:
    label: Reactive Power Absorption Factor [pu]
    description: "Fraction of active power absorbed as reactive power at each LCC\
      \ converter station. Typical: 0.5\u20130.6. LCC only.\n"
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - pu
  active_power_injection:
    label: Shunt Active Power [MW]
    description: Active power component of a static shunt element at nominal voltage,
      expressed in MW. For MATPOWER this maps to the bus Gs column at V = 1.0 p.u.;
      for pandapower this maps to net.shunt p_mw.
    value:
      type: decimal
    unit:
      constraints:
        enum:
        - MW
  reactive_power_injection:
    label: Shunt Reactive Power Injection [MVAr]
    description: 'Reactive power injection of a static shunt element at nominal voltage,
      expressed in MVAr. This follows the MATPOWER bus Bs convention: positive values
      inject reactive power at V = 1.0 p.u. When exchanging with pandapower, whose
      shunt q_mvar uses the opposite load-oriented sign convention, the importer/exporter
      converts the sign.

      '
    value:
      type: decimal
    unit:
      constraints:
        enum:
        - MVAr
  supply_price:
    label: Supply Price
    description: 'Marginal price at which the external supply injects energy into
      the system [MU/MWh]. Acts as the cost signal for the slack source in economic
      dispatch and market clearing. Set to 0 for a free slack (e.g. reference bus
      in a power flow). Set to a large positive value (e.g. value_of_lost_load) to
      represent an emergency import of last resort.

      '
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - MU/MWh
  supply_capacity:
    label: Supply Capacity
    description: "Maximum power the external supply can inject [MW]. When absent or\
      \ null the supply is treated as uncapacitated (true slack \u2014 unlimited injection).\
      \ Set an explicit value to model a capacity-limited import connection such as\
      \ a cross-border cable.\n"
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - MW
  is_slack:
    label: Is Slack
    description: 'Boolean flag indicating that this ExternalSupply acts as the system
      slack / reference node. Exactly one ExternalSupply per connected island should
      have is_slack = true. When true, the supply absorbs all active power imbalances
      and the connected bus is treated as the angle reference in AC power flow (bus
      type = slack).

      '
    value:
      type: boolean
  maximum_discharging_power:
    description: Upper limit on instantaneous power output during discharging or generation,
      constrained by turbine/converter size and operating limits (MW).
    label: Maximum Discharging Power
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - MW
  pumping_efficiency:
    description: "Efficiency of the pumping operation in a pumped-hydro storage unit\
      \ \u2014 ratio of hydraulic energy stored in the upper reservoir to the electrical\
      \ energy consumed during pumping. Distinct from charging_efficiency which is\
      \ used for batteries. Only relevant for storage_technology_type values of\
      \ \"phs\" (pumped-hydro storage). "
    label: Pumping Efficiency
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
        maximum: 1.0
    unit:
      constraints:
        enum:
        - pu
  maximum_pumping_power:
    description: 'Maximum electrical power consumed during pumping operation [MW].
      May differ from the turbine generation capacity in ternary or quaternary configurations.
      Only relevant for phs_closed_loop and phs_open_loop. '
    label: Maximum Pumping Power
    provenance_ref: Define the provenance here.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum:
        - MW
  resource_group:
    description: Broad group of a NaturalResource.
    label: Resource Group
    provenance_ref: Define the provenance here.
    value:
      type: string
      constraints:
        enum:
        - renewable
        - hydro
        - geothermal
        - environmental
  resource_type:
    description: >
      Specific natural resource kind. Intentionally open/extensible
      (not a closed enum) since new resource types are expected as
      models grow — but new values should follow the existing
      snake_case convention. Recommended starting vocabulary, drawn
      from what's actually used across this toolbox's examples:
      "wind", "solar_irradiance", "water_inflow". Broader group
      classification belongs in resource_group instead.
    label: Resource Type
    provenance_ref: Define the provenance here.
    value:
      type: string
  natural_resource_unit:
    description: Canonical physical unit used when the resource is represented as
      an absolute quantity or rate.
    label: Natural Resource Unit
    provenance_ref: Define the provenance here.
    value:
      type: string
  control_mode:
    description: Generator control mode used in a power-flow scenario.
    label: Control Mode
    value:
      type: string
      constraints:
        enum:
        - slack
        - voltage_control
        - reactive_power_control
        - active_power_control
        - disabled
