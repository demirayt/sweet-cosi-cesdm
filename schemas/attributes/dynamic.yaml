# Dynamic simulation attributes
# Naming convention: <Family>_<Model>_<Parameter>
#   Family  = machine domain (MACHINE, AVR, GOV, PSS)
#   Model   = specific IEEE / commercial model identifier
#   Parameter = standard symbol from the model's defining IEEE standard
#
# Underscore-separated (not dot-separated): these ids need to work as
# plain Python identifiers/kwargs directly (add_generator_dynamic_
# view_subtransient(entity_id, MACHINE_xd=1.8, ...)) without a caller
# having to str.replace(".", "_") first.
#
# Machine reactances use short IEEE symbols (xd, xq, …) — these are
# internationally unambiguous and carry no cross-model collision risk.
# The <Model> segment (SEXS/AC1A/IEEEG1/...) exists specifically to
# avoid collisions between models that reuse the same short symbol
# (e.g. AVR_SEXS_Ka vs AVR_AC1A_Ka are both real, both "Ka", both
# genuinely different gains).
#
# References:
#   IEEE Std 1110-2002  — Synchronous Generator Modelling
#   IEEE Std 421.5-2016 — Excitation System Models
#   PSS/E Model Library (Siemens PTI)

attributes:

  # ════════════════════════════════════════════════════════════════════════════
  # MACHINE — subtransient synchronous machine (IEEE Std 1110-2002)
  # ════════════════════════════════════════════════════════════════════════════

  MACHINE_rated_mva:
    label: Rated MVA
    description: >
      Nominal apparent power rating of the synchronous machine [MVA].
      Defines the per-unit base: all machine reactances are in pu on this base.
    provenance_ref: IEEE Std 1110-2002, Section 3.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [MVA]

  MACHINE_rated_kv:
    label: Rated kV
    description: >
      Nominal line-to-line terminal voltage of the machine [kV].
      Together with rated_mva defines the machine impedance base
      Z_base = rated_kv² / rated_mva [Ω].
    provenance_ref: IEC 60034-1.
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [kV]

  MACHINE_model:
    label: Machine Model
    description: >
      Dynamic model order identifier used in the simulation.
    value:
      type: string
      constraints:
        enum:
          - classical
          - two_axis
          - subtransient_4th
          - subtransient_6th
          - subtransient_8th

  MACHINE_H:
    label: H — inertia constant
    description: >
      Stored kinetic energy at rated speed / rated MVA [s].
      H = ½·J·ω₀² / Sn. Governs dω/dt = (Pm − Pe) / (2H).
    provenance_ref: Anderson & Fouad (2003), Eq. 2.33.
    value:
      type: decimal
      default: 5.0
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  MACHINE_D:
    label: D — mechanical damping coefficient
    description: >
      Damping torque proportional to speed deviation (pu torque / pu speed).
      Dimensionless. Typical range 0–3; default 0.
    value:
      type: decimal
      default: 0.0
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [pu]

  MACHINE_xd:
    label: Xd — d-axis synchronous reactance
    description: >
      Direct-axis synchronous reactance [pu on machine base].
      Steady-state d-axis air-gap impedance. Typical range 1.0–2.0 pu.
    provenance_ref: IEEE Std 1110-2002, Table 3.
    value:
      type: decimal
      default: 1.8
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [pu]

  MACHINE_xq:
    label: Xq — q-axis synchronous reactance
    description: >
      Quadrature-axis synchronous reactance [pu on machine base].
    value:
      type: decimal
      default: 1.7
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [pu]

  MACHINE_xd_prime:
    label: X'd — d-axis transient reactance
    description: >
      Direct-axis transient reactance [pu on machine base].
    value:
      type: decimal
      default: 0.3
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [pu]

  MACHINE_xq_prime:
    label: X'q — q-axis transient reactance
    description: >
      Quadrature-axis transient reactance [pu on machine base].
    value:
      type: decimal
      default: 0.55
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [pu]

  MACHINE_Td0_prime:
    label: T'd0 — d-axis transient open-circuit time constant
    description: >
      Direct-axis transient open-circuit time constant [s].
    value:
      type: decimal
      default: 8.0
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  MACHINE_Tq0_prime:
    label: T'q0 — q-axis transient open-circuit time constant
    description: >
      Quadrature-axis transient open-circuit time constant [s].
    value:
      type: decimal
      default: 1.0
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  MACHINE_xd_dprime:
    label: X''d — d-axis subtransient reactance
    description: >
      Direct-axis subtransient reactance [pu on machine base].
      Governs first-cycle behaviour after a disturbance.
    value:
      type: decimal
      default: 0.25
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [pu]

  MACHINE_xq_dprime:
    label: X''q — q-axis subtransient reactance
    description: >
      Quadrature-axis subtransient reactance [pu on machine base].
    value:
      type: decimal
      default: 0.25
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [pu]

  MACHINE_Td0_dprime:
    label: T''d0 — d-axis subtransient open-circuit time constant
    description: >
      Direct-axis subtransient open-circuit time constant [s].
    value:
      type: decimal
      default: 0.03
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  MACHINE_Tq0_dprime:
    label: T''q0 — q-axis subtransient open-circuit time constant
    description: >
      Quadrature-axis subtransient open-circuit time constant [s].
    value:
      type: decimal
      default: 0.05
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  MACHINE_ra:
    label: Ra — armature resistance
    description: >
      Armature (stator) resistance [pu on machine base].
      Typically 0.002–0.005 pu; often neglected in simplified models.
    value:
      type: decimal
      default: 0.003
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [pu]

  MACHINE_xl:
    label: Xl — stator leakage reactance
    description: >
      Stator leakage reactance [pu on machine base].
    value:
      type: decimal
      default: 0.2
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [pu]

  # ════════════════════════════════════════════════════════════════════════════
  # AVR — shared limits (apply across multiple AVR model types)
  # ════════════════════════════════════════════════════════════════════════════

  AVR_Efd_min:
    label: Efd_min — minimum field voltage
    description: >
      Minimum field voltage limit [pu on machine air-gap base].
      Prevents field reversal under leading power factor operation.
    value:
      type: decimal
      default: -6.0
    unit:
      constraints:
        enum: [pu]

  AVR_Efd_max:
    label: Efd_max — maximum (ceiling) field voltage
    description: >
      Ceiling field voltage limit [pu on machine air-gap base].
      Represents AVR forcing capability (typically 3–6 pu).
    value:
      type: decimal
      default: 6.0
    unit:
      constraints:
        enum: [pu]

  AVR_Va_min:
    label: Va_min — regulator output lower limit
    description: >
      Lower limit on voltage regulator output before the exciter block [pu].
    value:
      type: decimal
      default: -10.0
    unit:
      constraints:
        enum: [pu]

  AVR_Va_max:
    label: Va_max — regulator output upper limit
    description: >
      Upper limit on voltage regulator output before the exciter block [pu].
    value:
      type: decimal
      default: 10.0
    unit:
      constraints:
        enum: [pu]

  AVR_Vr_min:
    label: Vr_min — exciter lower output limit
    description: >
      Lower limit on the internal regulator reference signal [pu]. IEEET1.
    value:
      type: decimal
      default: -1.0
    unit:
      constraints:
        enum: [pu]

  AVR_Vr_max:
    label: Vr_max — exciter upper output limit
    description: >
      Upper limit on the internal regulator reference signal [pu]. IEEET1.
    value:
      type: decimal
      default: 1.0
    unit:
      constraints:
        enum: [pu]

  AVR_Tr:
    label: Tr — voltage transducer time constant
    description: >
      Terminal voltage transducer / filter time constant [s].
      Common to IEEET1, AC1A, ST1A. Typical: 0.01–0.05 s.
    value:
      type: decimal
      default: 0.02
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  # ════════════════════════════════════════════════════════════════════════════
  # AVR.SEXS — Simplified Exciter (PSS/E)
  # ════════════════════════════════════════════════════════════════════════════

  AVR_SEXS_Ka:
    label: Ka — voltage regulator gain
    description: >
      Regulator forward gain [pu]. Efd = Ka/(1+s·Ta) · (Vref − Vt + Vs).
    provenance_ref: PSS/E Model Library, SEXS.
    value:
      type: decimal
      default: 200.0
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [pu]

  AVR_SEXS_Ta:
    label: Ta — regulator time constant
    description: >
      First-order regulator lag time constant [s].
    value:
      type: decimal
      default: 0.01
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  # ════════════════════════════════════════════════════════════════════════════
  # AVR.IEEET1 — IEEE Type 1 DC exciter (IEEE Std 421.5-2016, Sec. 3)
  # ════════════════════════════════════════════════════════════════════════════

  AVR_IEEET1_Ka:
    label: Ka — voltage regulator gain
    description: >
      Regulator gain [pu]. IEEE Std 421.5-2016, IEEET1.
    value:
      type: decimal
      default: 400.0
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [pu]

  AVR_IEEET1_Ta:
    label: Ta — regulator time constant
    description: >
      Regulator lag time constant [s]. IEEET1.
    value:
      type: decimal
      default: 0.02
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  AVR_IEEET1_Ke:
    label: Ke — exciter constant
    description: >
      Self-excitation constant of the DC exciter [pu]. IEEET1.
    value:
      type: decimal
      default: 1.0
    unit:
      constraints:
        enum: [pu]

  AVR_IEEET1_Te:
    label: Te — exciter time constant
    description: >
      Exciter field circuit time constant [s]. IEEET1.
    value:
      type: decimal
      default: 0.8
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  AVR_IEEET1_Kf:
    label: Kf — rate feedback gain
    description: >
      Exciter stabilising rate-feedback gain [pu]. IEEET1.
    value:
      type: decimal
      default: 0.03
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [pu]

  AVR_IEEET1_Tf:
    label: Tf — rate feedback time constant
    description: >
      Exciter stabilising feedback filter time constant [s]. IEEET1.
    value:
      type: decimal
      default: 1.0
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  # ════════════════════════════════════════════════════════════════════════════
  # AVR.AC1A — IEEE Type AC1A alternator-rectifier (IEEE Std 421.5-2016, Sec. 6)
  # ════════════════════════════════════════════════════════════════════════════

  AVR_AC1A_Ka:
    label: Ka — voltage regulator gain
    description: >
      Regulator gain [pu]. IEEE Std 421.5-2016, AC1A.
    value:
      type: decimal
      default: 400.0
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [pu]

  AVR_AC1A_Ta:
    label: Ta — regulator time constant
    description: >
      Regulator lag time constant [s]. AC1A.
    value:
      type: decimal
      default: 0.02
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  AVR_AC1A_Tb:
    label: Tb — TGR denominator time constant
    description: >
      Transient gain reduction (TGR) lag time constant [s]. AC1A.
    value:
      type: decimal
      default: 1.0
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  AVR_AC1A_Tc:
    label: Tc — TGR numerator time constant
    description: >
      Transient gain reduction (TGR) lead time constant [s]. AC1A.
    value:
      type: decimal
      default: 1.0
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  AVR_AC1A_Ke:
    label: Ke — exciter constant
    description: >
      Self-excitation constant [pu]. AC1A.
    value:
      type: decimal
      default: 1.0
    unit:
      constraints:
        enum: [pu]

  AVR_AC1A_Te:
    label: Te — exciter time constant
    description: >
      Exciter field circuit time constant [s]. AC1A.
    value:
      type: decimal
      default: 0.8
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  AVR_AC1A_Kf:
    label: Kf — rate feedback gain
    description: >
      Stabilising rate-feedback gain [pu]. AC1A.
    value:
      type: decimal
      default: 0.03
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [pu]

  AVR_AC1A_Tf:
    label: Tf — rate feedback time constant
    description: >
      Stabilising feedback time constant [s]. AC1A.
    value:
      type: decimal
      default: 1.0
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  AVR_AC1A_Kc:
    label: Kc — rectifier loading factor
    description: >
      Rectifier voltage drop factor accounting for commutation [pu]. AC1A.
    value:
      type: decimal
      default: 0.2
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [pu]

  AVR_AC1A_Kd:
    label: Kd — demagnetising factor
    description: >
      d-axis generator reaction to exciter demagnetising factor [pu]. AC1A.
    value:
      type: decimal
      default: 0.38
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [pu]

  # ════════════════════════════════════════════════════════════════════════════
  # AVR.ST1A — IEEE Type ST1A static thyristor exciter (IEEE Std 421.5-2016, Sec. 7)
  # ════════════════════════════════════════════════════════════════════════════

  AVR_ST1A_Ka:
    label: Ka — voltage regulator gain
    description: >
      Regulator gain [pu]. IEEE Std 421.5-2016, ST1A.
    value:
      type: decimal
      default: 200.0
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [pu]

  AVR_ST1A_Ta:
    label: Ta — regulator time constant
    description: >
      Regulator lag time constant [s]. ST1A.
    value:
      type: decimal
      default: 0.02
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  AVR_ST1A_Tb:
    label: Tb — TGR denominator time constant
    description: >
      Transient gain reduction lag time constant [s]. ST1A.
    value:
      type: decimal
      default: 1.0
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  AVR_ST1A_Tc:
    label: Tc — TGR numerator time constant
    description: >
      Transient gain reduction lead time constant [s]. ST1A.
    value:
      type: decimal
      default: 1.0
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  AVR_ST1A_Kl:
    label: Kl — field weakening gain
    description: >
      Gain applied when regulator input is below threshold [pu]. ST1A.
      Typically 0 (disabled).
    value:
      type: decimal
      default: 0.0
    unit:
      constraints:
        enum: [pu]

  # ════════════════════════════════════════════════════════════════════════════
  # GOV — shared limits
  # ════════════════════════════════════════════════════════════════════════════

  GOV_Pmax:
    label: Pmax — maximum mechanical power
    description: >
      Maximum mechanical power from the prime mover [MW on machine base].
    value:
      type: decimal
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [MW]

  GOV_Pmin:
    label: Pmin — minimum mechanical power
    description: >
      Minimum mechanical power from the prime mover [MW on machine base].
    value:
      type: decimal
      default: 0.0
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [MW]

  GOV_Db:
    label: Db — governor speed deadband
    description: >
      Speed error deadband around rated frequency [pu].
      Governor does not respond within ±Db. Common to IEEEG1, GGOV1.
    value:
      type: decimal
      default: 0.0
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [pu]

  # ════════════════════════════════════════════════════════════════════════════
  # GOV.IEEEG1 — IEEE Type G1 steam governor (IEEE Std 1110-2002)
  # ════════════════════════════════════════════════════════════════════════════

  GOV_IEEEG1_R:
    label: R — speed droop
    description: >
      Permanent speed droop [pu]. 0.05 = 5 % droop. IEEEG1.
    value:
      type: decimal
      default: 0.05
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [pu]

  GOV_IEEEG1_T1:
    label: T1 — governor lag time constant
    description: >
      First lag time constant of the governor control loop [s]. IEEEG1.
    value:
      type: decimal
      default: 0.1
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  GOV_IEEEG1_T2:
    label: T2 — governor lead time constant
    description: >
      Lead time constant of the governor lead-lag compensator [s]. IEEEG1.
      Set to 0 for pure lag.
    value:
      type: decimal
      default: 0.0
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  GOV_IEEEG1_T3:
    label: T3 — turbine time constant
    description: >
      Steam chest / prime mover time constant [s]. IEEEG1.
    value:
      type: decimal
      default: 0.3
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  # ════════════════════════════════════════════════════════════════════════════
  # GOV.GGOV1 — GE/PSS/E Generic Governor (gas turbine / combined cycle)
  # ════════════════════════════════════════════════════════════════════════════

  GOV_GGOV1_R:
    label: R — speed droop
    description: >
      Permanent speed droop [pu]. GGOV1.
    value:
      type: decimal
      default: 0.04
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [pu]

  GOV_GGOV1_Tpelec:
    label: Tpelec — electrical power transducer time constant
    description: >
      Electrical power measurement filter time constant [s]. GGOV1.
    value:
      type: decimal
      default: 1.0
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  GOV_GGOV1_Kpgov:
    label: Kpgov — PID proportional gain
    description: >
      Speed governor proportional gain [pu]. GGOV1.
    value:
      type: decimal
      default: 10.0
    unit:
      constraints:
        enum: [pu]

  GOV_GGOV1_Kigov:
    label: Kigov — PID integral gain
    description: >
      Speed governor integral gain [pu/s]. GGOV1.
    value:
      type: decimal
      default: 2.0
    unit:
      constraints:
        enum: [pu]

  GOV_GGOV1_Kdgov:
    label: Kdgov — PID derivative gain
    description: >
      Speed governor derivative gain [pu·s]. GGOV1.
    value:
      type: decimal
      default: 0.0
    unit:
      constraints:
        enum: [pu]

  GOV_GGOV1_Tdgov:
    label: Tdgov — derivative filter time constant
    description: >
      Derivative controller filter time constant [s]. GGOV1.
    value:
      type: decimal
      default: 1.0
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  GOV_GGOV1_Tact:
    label: Tact — actuator time constant
    description: >
      Valve/gate actuator time constant [s]. GGOV1.
    value:
      type: decimal
      default: 0.5
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  GOV_GGOV1_T3:
    label: T3 — fuel system / turbine time constant
    description: >
      Combustor / turbine delay time constant [s]. GGOV1.
    value:
      type: decimal
      default: 0.85
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  GOV_GGOV1_Ropen:
    label: Ropen — valve opening rate limit
    description: >
      Maximum valve opening rate [pu/s]. GGOV1.
    value:
      type: decimal
      default: 0.1
    unit:
      constraints:
        enum: [pu/s]

  GOV_GGOV1_Rclose:
    label: Rclose — valve closing rate limit
    description: >
      Maximum valve closing rate [pu/s] (negative). GGOV1.
    value:
      type: decimal
      default: -0.1
    unit:
      constraints:
        enum: [pu/s]

  GOV_GGOV1_Kimw:
    label: Kimw — load control integral gain
    description: >
      Load control / power error integration gain [pu/s]. GGOV1.
      Set to 0 to disable droop reset.
    value:
      type: decimal
      default: 0.0
    unit:
      constraints:
        enum: [pu]

  GOV_GGOV1_Aset:
    label: Aset — acceleration limiter setpoint
    description: >
      Acceleration limiter setpoint [pu/s]. GGOV1.
    value:
      type: decimal
      default: 0.01
    unit:
      constraints:
        enum: [pu/s]

  GOV_GGOV1_Ka:
    label: Ka — acceleration limiter gain
    description: >
      Acceleration limiter proportional gain [pu]. GGOV1.
    value:
      type: decimal
      default: 10.0
    unit:
      constraints:
        enum: [pu]

  GOV_GGOV1_Ta:
    label: Ta — acceleration limiter time constant
    description: >
      Acceleration limiter filter time constant [s]. GGOV1.
    value:
      type: decimal
      default: 0.1
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  # ════════════════════════════════════════════════════════════════════════════
  # GOV.HYGOV — IEEE hydro turbine-governor (IEEE Std 1110-2002, Annex C)
  # ════════════════════════════════════════════════════════════════════════════

  GOV_HYGOV_R:
    label: R — permanent droop
    description: >
      Permanent (steady-state) speed droop [pu]. HYGOV.
    value:
      type: decimal
      default: 0.05
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [pu]

  GOV_HYGOV_r:
    label: r — temporary droop
    description: >
      Temporary droop [pu]. HYGOV. Provides faster transient response
      than permanent droop R before decaying via dashpot Tr.
    value:
      type: decimal
      default: 0.3
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [pu]

  GOV_HYGOV_Tr:
    label: Tr — dashpot reset time constant
    description: >
      Dashpot (temporary droop) reset time constant [s]. HYGOV.
    value:
      type: decimal
      default: 5.0
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  GOV_HYGOV_Tf:
    label: Tf — pilot valve / gate servo time constant
    description: >
      Pilot valve and gate servo time constant [s]. HYGOV.
    value:
      type: decimal
      default: 0.05
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  GOV_HYGOV_Tg:
    label: Tg — main gate time constant
    description: >
      Main gate (penstock flow) time constant [s]. HYGOV.
    value:
      type: decimal
      default: 0.5
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  GOV_HYGOV_Tw:
    label: Tw — water starting time
    description: >
      Water column (penstock) starting time constant [s]. HYGOV.
      Tw = L·Q0 / (g·H0·A).
    value:
      type: decimal
      default: 1.0
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  GOV_HYGOV_At:
    label: At — turbine gain
    description: >
      Turbine gain factor [pu]. HYGOV. Ratio of full-gate power to
      rated power at rated head.
    value:
      type: decimal
      default: 1.2
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [pu]

  GOV_HYGOV_Dturb:
    label: Dturb — turbine damping
    description: >
      Turbine self-regulation factor [pu power / pu speed]. HYGOV.
    value:
      type: decimal
      default: 0.5
    unit:
      constraints:
        enum: [pu]

  GOV_HYGOV_qNL:
    label: qNL — no-load flow
    description: >
      No-load water flow at rated head [pu of rated flow]. HYGOV.
    value:
      type: decimal
      default: 0.08
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [pu]

