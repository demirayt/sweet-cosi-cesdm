  # PSS — shared limits
  # ════════════════════════════════════════════════════════════════════════════

  PSS_Vs_max:
    label: Vs_max — PSS output upper limit
    description: >
      Upper saturation limit on PSS supplementary voltage output [pu].
      Injected at AVR summing junction. Typical: 0.05–0.15 pu.
    value:
      type: decimal
      default: 0.1
    unit:
      constraints:
        enum: [pu]

  PSS_Vs_min:
    label: Vs_min — PSS output lower limit
    description: >
      Lower saturation limit on PSS supplementary voltage output [pu].
    value:
      type: decimal
      default: -0.1
    unit:
      constraints:
        enum: [pu]

  # ════════════════════════════════════════════════════════════════════════════
  # PSS.STAB1 — PSS/E STAB1 / IEEE PSS1A (IEEE Std 421.5-2016, Sec. 12.2)
  # ════════════════════════════════════════════════════════════════════════════

  PSS_STAB1_Kstab:
    label: Kstab — stabiliser gain
    description: >
      PSS forward path gain [pu]. STAB1 / PSS1A.
    provenance_ref: IEEE Std 421.5-2016, PSS1A.
    value:
      type: decimal
      default: 20.0
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [pu]

  PSS_STAB1_Tw:
    label: Tw — washout time constant
    description: >
      Washout high-pass filter time constant [s]. STAB1.
      Removes DC and low-frequency components. Typical: 5–20 s.
    value:
      type: decimal
      default: 10.0
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  PSS_STAB1_T1:
    label: T1 — first lead time constant
    description: >
      First lead-lag stage numerator time constant [s]. STAB1.
    value:
      type: decimal
      default: 0.05
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  PSS_STAB1_T2:
    label: T2 — first lag time constant
    description: >
      First lead-lag stage denominator time constant [s]. STAB1.
    value:
      type: decimal
      default: 0.02
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  PSS_STAB1_T3:
    label: T3 — second lead time constant
    description: >
      Second lead-lag stage numerator time constant [s]. STAB1.
    value:
      type: decimal
      default: 3.0
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

  PSS_STAB1_T4:
    label: T4 — second lag time constant
    description: >
      Second lead-lag stage denominator time constant [s]. STAB1.
    value:
      type: decimal
      default: 5.4
      constraints:
        minimum: 0.0
    unit:
      constraints:
        enum: [s]

