<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="680" viewBox="0 0 1000 680" role="img" aria-label="CESDM layered architecture diagram">
  <defs>
    <style>
      .title      { font: 700 24px sans-serif; fill: #1f2937; }
      .layerlabel { font: 700 14px sans-serif; fill: #1f2937; }
      .sublabel   { font: 600 13px sans-serif; fill: #111827; }
      .small      { font: 500 12px sans-serif; fill: #374151; }
      .mono       { font: 500 11px monospace; fill: #374151; }
      .tag        { font: 600 11px sans-serif; fill: #6b7280; font-style: italic; }
      .arrowlabel { font: 600 11px sans-serif; fill: #475569; }
      .box        { fill: #f8fafc; stroke: #334155; stroke-width: 1.4; rx: 10; }
      .yourcode   { fill: #f1f5f9; stroke: #0f172a; stroke-width: 2; rx: 12; }
      .proxy      { fill: #fef9c3; stroke: #a16207; stroke-width: 2; rx: 14; }
      .cesdm      { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 14; }
      .subbox     { fill: #ffffff; stroke: #0369a1; stroke-width: 1; rx: 8; }
      .ear        { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 12; }
      .schema     { fill: #fdf2f8; stroke: #a21caf; stroke-width: 2; rx: 12; }
      .arrow      { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow2     { stroke: #94a3b8; stroke-width: 1.6; fill: none; stroke-dasharray: 4 3; marker-end: url(#arrowhead2); }
    </style>
    <marker id="arrowhead" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#475569" />
    </marker>
    <marker id="arrowhead2" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>

  <text x="500" y="30" text-anchor="middle" class="title">CESDM Architecture</text>

  <!-- YOUR CODE -->
  <rect x="220" y="46" width="560" height="80" class="yourcode"/>
  <text x="500" y="68" text-anchor="middle" class="layerlabel">YOUR CODE</text>
  <text x="500" y="90" text-anchor="middle" class="mono">add_bus(...) · gen.dispatch.x = y · gen.connect(bus)</text>
  <text x="500" y="108" text-anchor="middle" class="mono">model.validate() · model.validate_for_analysis(...)</text>

  <path d="M500 126 L500 160" class="arrow"/>
  <text x="512" y="146" class="arrowlabel">uses</text>

  <!-- LAYER 3: Proxy API -->
  <rect x="170" y="162" width="660" height="78" class="proxy"/>
  <text x="500" y="185" text-anchor="middle" class="layerlabel">LAYER 3 — Object-Oriented Proxy API (cesdm.proxy)</text>
  <text x="500" y="205" text-anchor="middle" class="tag">optional convenience layer</text>
  <text x="500" y="225" text-anchor="middle" class="small">AssetProxy / ViewProxy — schema-driven view resolution, typo-checked attribute/relation access</text>

  <path d="M500 240 L500 274" class="arrow"/>
  <text x="512" y="260" class="arrowlabel">built on</text>

  <!-- LAYER 2: CESDM Domain Layer -->
  <rect x="80" y="276" width="840" height="228" class="cesdm"/>
  <text x="500" y="300" text-anchor="middle" class="layerlabel">LAYER 2 — CESDM Domain Layer (cesdm_toolbox)</text>

  <rect x="110" y="314" width="375" height="82" class="subbox"/>
  <text x="297" y="336" text-anchor="middle" class="sublabel">Representation Views</text>
  <text x="297" y="356" text-anchor="middle" class="small">asset identity, separate from</text>
  <text x="297" y="372" text-anchor="middle" class="small">dispatch · powerflow · dynamic · topology</text>

  <rect x="515" y="314" width="375" height="82" class="subbox"/>
  <text x="702" y="336" text-anchor="middle" class="sublabel">Composite Builders</text>
  <text x="702" y="356" text-anchor="middle" class="small">add_generator, add_reservoir_hydro,</text>
  <text x="702" y="372" text-anchor="middle" class="small">create_demand_unit, ...</text>

  <rect x="110" y="404" width="375" height="82" class="subbox"/>
  <text x="297" y="426" text-anchor="middle" class="sublabel">Import / Export Adapters</text>
  <text x="297" y="446" text-anchor="middle" class="small">PyPSA · TYNDP · MATPOWER ·</text>
  <text x="297" y="462" text-anchor="middle" class="small">pandapower · YAML · Frictionless · HDF5</text>

  <rect x="515" y="404" width="375" height="82" class="subbox"/>
  <text x="702" y="426" text-anchor="middle" class="sublabel">Analysis Validation</text>
  <text x="702" y="446" text-anchor="middle" class="small">validate_for_analysis() —</text>
  <text x="702" y="462" text-anchor="middle" class="small">fitness for a study, via YAML profiles</text>

  <path d="M297 504 L297 540" class="arrow"/>
  <text x="309" y="524" class="arrowlabel">built on</text>

  <path d="M702 504 L702 540" class="arrow"/>
  <text x="714" y="524" class="arrowlabel">reads</text>

  <!-- LAYER 1: EAR Engine + Schema, side by side -->
  <rect x="90" y="542" width="400" height="112" class="ear"/>
  <text x="290" y="568" text-anchor="middle" class="layerlabel">LAYER 1 — EAR Engine (ear_toolbox)</text>
  <text x="290" y="590" text-anchor="middle" class="small">Entity · Attribute · Relation</text>
  <text x="290" y="608" text-anchor="middle" class="tag">domain-agnostic — works for any schema</text>
  <text x="290" y="626" text-anchor="middle" class="small">(proven: households, energy communities, ...)</text>

  <rect x="510" y="542" width="400" height="112" class="schema"/>
  <text x="710" y="568" text-anchor="middle" class="layerlabel">SCHEMA (YAML)</text>
  <text x="710" y="590" text-anchor="middle" class="small">schemas/ — core energy-system schema</text>
  <text x="710" y="608" text-anchor="middle" class="small">schemas_agentbased/ — sibling extension</text>
  <text x="710" y="626" text-anchor="middle" class="tag">+ your own custom extensions</text>

  <path d="M508 598 L494 598" class="arrow2"/>
  <text x="500" y="642" text-anchor="middle" class="arrowlabel" style="font-size:10px;">loaded &amp; interpreted by</text>
</svg>
