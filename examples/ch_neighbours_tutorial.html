<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CESDM Tutorial — CH + Neighbours (with Library)</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #0d1117; color: #e6edf3;
  height: 100vh; overflow: hidden;
  display: flex; flex-direction: column;
}
#prog { height: 3px; background: #21262d; flex-shrink: 0; }
#prog-fill { height: 100%; background: linear-gradient(90deg,#58a6ff,#3fb950); transition: width .4s; }
#stage { flex: 1; position: relative; overflow: hidden; }
.slide {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  padding: 32px 56px;
  opacity: 0; transform: translateX(50px);
  transition: opacity .4s ease, transform .4s ease;
  pointer-events: none;
}
.slide.active { opacity: 1; transform: none; pointer-events: all; }
.slide.exit   { opacity: 0; transform: translateX(-50px); }
.stag { font-size: 11px; font-weight: 700; letter-spacing: .12em;
        text-transform: uppercase; color: #58a6ff; margin-bottom: 10px; }
h1 { font-size: 36px; font-weight: 700; text-align: center;
     background: linear-gradient(135deg,#e6edf3 30%,#58a6ff);
     -webkit-background-clip: text; -webkit-text-fill-color: transparent;
     background-clip: text; margin-bottom: 12px; line-height: 1.2; }
h2 { font-size: 24px; font-weight: 600; text-align: center;
     color: #e6edf3; margin-bottom: 18px; }
.sub { font-size: 16px; color: #8b949e; text-align: center;
       max-width: 640px; line-height: 1.7; margin-bottom: 8px; }
.sub strong { color: #e6edf3; }

/* ── code block ── */
.cb {
  background: #161b22; border: 1px solid #30363d; border-radius: 10px;
  padding: 18px 22px; font-family: "SF Mono","Fira Code",monospace;
  font-size: 12.5px; line-height: 1.75; text-align: left;
  max-width: 700px; width: 100%; margin-top: 14px;
}
.cb div {
  opacity: 0; transform: translateX(-5px);
  transition: opacity .28s, transform .28s;
}
.cb div.s { opacity: 1; transform: none; }
.cm { color: #8b949e; } .cf { color: #ff7b72; }
.cs { color: #a5d6ff; } .cn { color: #ffa657; }
.ck { color: #58a6ff; } .cc { color: #3fb950; }
.cv { color: #bc8cff; }

/* ── boxes ── */
.boxes { display: flex; gap: 16px; margin-top: 20px; width: 100%; max-width: 820px; }
.box {
  flex: 1; background: #161b22; border: 1px solid #30363d;
  border-radius: 10px; padding: 18px 14px; text-align: center;
  opacity: 0; transform: translateY(10px);
  transition: opacity .35s, transform .35s;
}
.box.s { opacity: 1; transform: none; }
.box .ic { font-size: 28px; margin-bottom: 8px; }
.box h3 { font-size: 14px; font-weight: 600; color: #e6edf3; margin-bottom: 5px; }
.box p  { font-size: 12px; color: #8b949e; line-height: 1.5; }
.box .badge { display: inline-block; margin-top: 8px; font-size: 10px; padding: 2px 7px;
              border-radius: 12px; font-weight: 700; }
.be { background: #1f3d5c; color: #58a6ff; }
.ba { background: #1a3d2a; color: #3fb950; }
.br { background: #3d1f5c; color: #bc8cff; }

/* ── map diagram ── */
.map-wrap { position: relative; width: 720px; height: 320px; margin-top: 16px; }
.map-wrap svg { position: absolute; inset: 0; pointer-events: none; }
.mnode {
  position: absolute; border-radius: 10px; padding: 10px 14px;
  font-size: 12px; font-family: "SF Mono",monospace; text-align: center;
  opacity: 0; transform: scale(.85);
  transition: opacity .4s, transform .4s;
}
.mnode.s { opacity: 1; transform: scale(1); }
.mn-e { border: 2px solid #58a6ff; background: #0d1f33; }
.mn-e .mt { color: #58a6ff; font-size: 10px; font-weight: 700;
             text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
.mn-e .mi { color: #e6edf3; font-weight: 700; font-size: 13px; }
.mn-e .ms { color: #8b949e; font-size: 11px; }

/* ── step list ── */
.steps { list-style: none; max-width: 680px; width: 100%; margin-top: 16px; }
.steps li {
  background: #161b22; border: 1px solid #30363d;
  border-left: 3px solid #58a6ff; border-radius: 0 8px 8px 0;
  padding: 10px 14px; margin-bottom: 8px;
  font-size: 13px; color: #8b949e; line-height: 1.5;
  opacity: 0; transform: translateX(-8px);
  transition: opacity .3s, transform .3s;
}
.steps li.s { opacity: 1; transform: none; }
.steps li strong { color: #e6edf3; }
.steps li code { color: #58a6ff; font-family: "SF Mono",monospace; font-size: 12px; }

/* ── stat table ── */
.stat-wrap { display: flex; gap: 20px; margin-top: 18px; width: 100%; max-width: 820px; }
.stat-col { flex: 1; background: #161b22; border: 1px solid #30363d;
            border-radius: 10px; padding: 14px 16px; }
.stat-col h4 { font-size: 11px; font-weight: 700; letter-spacing: .08em;
               text-transform: uppercase; color: #8b949e; margin-bottom: 10px; }
.stat-row {
  display: flex; justify-content: space-between;
  font-size: 12px; padding: 4px 0; border-top: 1px solid #21262d;
  opacity: 0; transform: translateY(4px);
  transition: opacity .25s, transform .25s;
}
.stat-row.s { opacity: 1; transform: none; }
.stat-row .sk { color: #8b949e; }
.stat-row .sv { color: #3fb950; font-weight: 600; }
.stat-row .svc { color: #58a6ff; }

/* ── asset-view diagram ── */
.av-wrap { display: flex; align-items: flex-start; gap: 14px; margin-top: 18px;
           width: 100%; max-width: 820px; }
.av-asset { background: #0d1f33; border: 2px solid #58a6ff; border-radius: 10px;
            padding: 14px 16px; min-width: 200px; font-family: "SF Mono",monospace; }
.av-views { display: flex; flex-direction: column; gap: 10px; flex: 1; }
.av-view  { background: #161b22; border-radius: 8px; padding: 12px 14px;
            font-family: "SF Mono",monospace; font-size: 12px;
            opacity: 0; transform: translateX(10px);
            transition: opacity .35s, transform .35s; }
.av-view.s { opacity: 1; transform: none; }
.av-title { font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: .08em; margin-bottom: 6px; }
.av-row { color: #8b949e; margin: 2px 0; }
.av-row span { }
.col-topo { border: 1.5px solid #bc8cff; }
.col-topo .av-title { color: #bc8cff; }
.col-disp { border: 1.5px solid #3fb950; }
.col-disp .av-title { color: #3fb950; }
.col-pf   { border: 1.5px solid #ffa657; }
.col-pf   .av-title { color: #ffa657; }
.av-arr { display: flex; align-items: center; padding-top: 24px;
          color: #30363d; font-size: 20px; flex-shrink: 0; }

/* ── controls ── */
#ctrl {
  display: flex; align-items: center; justify-content: center;
  gap: 14px; padding: 12px 24px;
  background: #161b22; border-top: 1px solid #21262d; flex-shrink: 0;
}
.btn { background: #21262d; border: 1px solid #30363d; color: #e6edf3;
       border-radius: 8px; padding: 7px 18px; font-size: 13px;
       cursor: pointer; transition: background .2s, border-color .2s; }
.btn:hover { background: #30363d; border-color: #58a6ff; }
.btn:disabled { opacity: .28; cursor: default; }
.btn.pri { background: #1f4068; border-color: #58a6ff;
           color: #58a6ff; font-weight: 600; }
.btn.pri:hover { background: #2a5585; }
#cnt { font-size: 12px; color: #8b949e; min-width: 72px; text-align: center; }
#dots { display: flex; gap: 5px; }
.dot { width: 7px; height: 7px; border-radius: 50%;
       background: #30363d; transition: background .25s; cursor: pointer; }
.dot.a { background: #58a6ff; }
</style>
</head>
<body>
<div id="prog"><div id="prog-fill"></div></div>
<div id="stage"></div>
<div id="ctrl">
  <button class="btn" id="bp">← Back</button>
  <div id="dots"></div>
  <span id="cnt"></span>
  <button class="btn pri" id="bn">Next →</button>
</div>
<script>
const S = [ // slides

// 0 — title
{ tag:"Welcome", f(el) {
  el.innerHTML = `
    <div class="stag">CESDM Step-by-Step Tutorial</div>
    <h1>Switzerland + Neighbours<br>Electricity Model</h1>
    <div class="sub">Build a five-country electricity model using the three CESDM
      primitives and the <strong>default technology library</strong> for
      realistic efficiencies, costs, and carrier IDs.</div>
    <div class="boxes" style="max-width:600px">
      <div class="box" id="b0"><div class="ic">🏭</div><h3>Entity</h3>
        <p>What exists in the system</p><span class="badge be">E</span></div>
      <div class="box" id="b1"><div class="ic">📐</div><h3>Attribute</h3>
        <p>Properties and values</p><span class="badge ba">A</span></div>
      <div class="box" id="b2"><div class="ic">🔗</div><h3>Relation</h3>
        <p>Links between entities</p><span class="badge br">R</span></div>
    </div>`;
  [0,1,2].forEach(i=>t(()=>$('b'+i).classList.add('s'),200+i*150));
}},

// 1 — the model — full asset map
{ tag:"The Model", f(el) {
  el.innerHTML = `
    <h2 style="margin-bottom:6px">What we are building</h2>
    <div class="sub" style="margin-bottom:8px;font-size:13px">
      5 countries · 13 generators · 5 demand units · 1 storage · 8 NTC interconnectors<br>
      <span style="font-size:12px;color:#8b949e">The diagram grows like the model: buses → demand → generation/storage → cross-border NTC links.</span>
    </div>
    <div style="position:relative;width:860px;height:430px">
      <svg id="ms" width="860" height="430" style="position:absolute;inset:0;pointer-events:none"></svg>

      <!-- Legend -->
      <div style="position:absolute;right:0;top:0;background:#161b22;border:1px solid #30363d;
           border-radius:8px;padding:8px 12px;font-size:11px;line-height:1.9;z-index:5">
        <div><span style="color:#58a6ff">■</span> ElectricalBus</div>
        <div><span style="color:#3fb950">↕</span> NTC Interconnector</div>
        <div><span style="color:#ffa657">⚡</span> Generation (MW)</div>
        <div><span style="color:#ff7b72">▼</span> DemandUnit + Demand.DispatchView</div>
        <div><span style="color:#bc8cff">◆</span> Storage (MW/MWh)</div>
      </div>

      <!-- Short tutorial callout -->
      <div style="position:absolute;left:0;bottom:0;width:250px;background:#161b22;border:1px solid #30363d;
           border-left:3px solid #58a6ff;border-radius:0 8px 8px 0;padding:9px 12px;font-size:11px;line-height:1.55;color:#8b949e;z-index:5">
        <strong style="color:#e6edf3">Tutorial idea:</strong> assets are stable identities.
        Views add modelling meaning: topology says <em>where</em>, dispatch says <em>how much</em>, power-flow says <em>how constrained</em>.
      </div>

      <!-- Bus nodes -->
      <div id="bde" style="position:absolute;left:375px;top:20px;background:#0d1f33;
           border:2px solid #58a6ff;border-radius:8px;padding:8px 12px;
           font-size:11px;text-align:center;opacity:0;transition:opacity .4s;z-index:3">
        <div style="color:#58a6ff;font-weight:700;font-size:10px;letter-spacing:.08em">GERMANY</div>
        <div style="color:#e6edf3;font-weight:700">bus.de · 380kV</div>
      </div>

      <div id="bfr" style="position:absolute;left:82px;top:158px;background:#0d1f33;
           border:2px solid #58a6ff;border-radius:8px;padding:8px 12px;
           font-size:11px;text-align:center;opacity:0;transition:opacity .4s;z-index:3">
        <div style="color:#58a6ff;font-weight:700;font-size:10px;letter-spacing:.08em">FRANCE</div>
        <div style="color:#e6edf3;font-weight:700">bus.fr · 400kV</div>
      </div>

      <div id="bch" style="position:absolute;left:378px;top:190px;background:#0d2a1a;
           border:2px solid #3fb950;border-radius:8px;padding:8px 14px;
           font-size:11px;text-align:center;opacity:0;transition:opacity .4s;z-index:4">
        <div style="color:#3fb950;font-weight:700;font-size:10px;letter-spacing:.08em">SWITZERLAND</div>
        <div style="color:#e6edf3;font-weight:700">bus.ch · 380kV</div>
      </div>

      <div id="bat" style="position:absolute;left:635px;top:158px;background:#0d1f33;
           border:2px solid #58a6ff;border-radius:8px;padding:8px 12px;
           font-size:11px;text-align:center;opacity:0;transition:opacity .4s;z-index:3">
        <div style="color:#58a6ff;font-weight:700;font-size:10px;letter-spacing:.08em">AUSTRIA</div>
        <div style="color:#e6edf3;font-weight:700">bus.at · 380kV</div>
      </div>

      <div id="bit" style="position:absolute;left:405px;top:340px;background:#0d1f33;
           border:2px solid #58a6ff;border-radius:8px;padding:8px 12px;
           font-size:11px;text-align:center;opacity:0;transition:opacity .4s;z-index:3">
        <div style="color:#58a6ff;font-weight:700;font-size:10px;letter-spacing:.08em">ITALY</div>
        <div style="color:#e6edf3;font-weight:700">bus.it · 380kV</div>
      </div>

      <!-- Generation asset bubbles — positioned away from lines and labels -->
      <div id="gde" style="position:absolute;left:250px;top:16px;opacity:0;transition:opacity .4s .3s;
           font-size:10px;line-height:1.6;background:#161b22;border:1px solid #ffa657;
           border-radius:6px;padding:6px 9px;z-index:5">
        <div style="color:#ffa657;font-weight:700;margin-bottom:2px">⚡ DE Generation</div>
        <div style="color:#3fb950">🌬 Onshore wind  30 GW</div>
        <div style="color:#fbbf24">☀ Solar PV      60 GW</div>
        <div style="color:#8b949e">🔥 Gas CCGT       6 GW</div>
      </div>

      <div id="gfr" style="position:absolute;left:0px;top:68px;opacity:0;transition:opacity .4s .45s;
           font-size:10px;line-height:1.6;background:#161b22;border:1px solid #ffa657;
           border-radius:6px;padding:6px 9px;z-index:5">
        <div style="color:#ffa657;font-weight:700;margin-bottom:2px">⚡ FR Generation</div>
        <div style="color:#a5d6ff">☢ Nuclear       56 GW</div>
        <div style="color:#8b949e">🔥 Gas CCGT       4 GW</div>
      </div>

      <div id="gch" style="position:absolute;left:240px;top:238px;opacity:0;transition:opacity .4s .6s;
           font-size:10px;line-height:1.6;background:#161b22;border:1px solid #ffa657;
           border-radius:6px;padding:6px 9px;z-index:5">
        <div style="color:#ffa657;font-weight:700;margin-bottom:2px">⚡ CH Generation</div>
        <div style="color:#60a5fa">💧 Hydro RoR     8 GW</div>
        <div style="color:#8b949e">🔥 Gas CCGT       3 GW</div>
        <div style="color:#a5d6ff">☢ Nuclear         2 GW</div>
        <div style="color:#3fb950">🌬 Wind          500 MW</div>
        <div style="color:#fbbf24">☀ Solar           2 GW</div>
        <div style="color:#bc8cff">◆ PHS 3GW/36GWh</div>
      </div>

      <div id="gat" style="position:absolute;left:630px;top:78px;opacity:0;transition:opacity .4s .75s;
           font-size:10px;line-height:1.6;background:#161b22;border:1px solid #ffa657;
           border-radius:6px;padding:6px 9px;z-index:5">
        <div style="color:#ffa657;font-weight:700;margin-bottom:2px">⚡ AT Generation</div>
        <div style="color:#60a5fa">💧 Hydro RoR     2 GW</div>
      </div>

      <div id="git" style="position:absolute;left:520px;top:346px;opacity:0;transition:opacity .4s .9s;
           font-size:10px;line-height:1.6;background:#161b22;border:1px solid #ffa657;
           border-radius:6px;padding:6px 9px;z-index:5">
        <div style="color:#ffa657;font-weight:700;margin-bottom:2px">⚡ IT Generation</div>
        <div style="color:#fbbf24">☀ Solar PV      20 GW</div>
        <div style="color:#8b949e">🔥 Gas CCGT       5 GW</div>
      </div>

      <!-- Demand labels: placed directly at the demand objects, away from bus titles -->
      <div id="dde" style="position:absolute;left:475px;top:58px;opacity:0;transition:opacity .4s 1.3s;
           font-size:10px;background:#161b22;border:1px solid #ff7b72;border-radius:5px;padding:4px 7px;z-index:6">
        <span style="color:#ff7b72">▼ Demand</span> 500 TWh/yr
      </div>
      <div id="dfr" style="position:absolute;left:160px;top:204px;opacity:0;transition:opacity .4s 1.4s;
           font-size:10px;background:#161b22;border:1px solid #ff7b72;border-radius:5px;padding:4px 7px;z-index:6">
        <span style="color:#ff7b72">▼ Demand</span> 450 TWh/yr
      </div>
      <div id="dch" style="position:absolute;left:495px;top:225px;opacity:0;transition:opacity .4s 1.5s;
           font-size:10px;background:#161b22;border:1px solid #ff7b72;border-radius:5px;padding:4px 7px;z-index:6">
        <span style="color:#ff7b72">▼ Demand</span> 60 TWh/yr
      </div>
      <div id="dat" style="position:absolute;left:705px;top:204px;opacity:0;transition:opacity .4s 1.6s;
           font-size:10px;background:#161b22;border:1px solid #ff7b72;border-radius:5px;padding:4px 7px;z-index:6">
        <span style="color:#ff7b72">▼ Demand</span> 70 TWh/yr
      </div>
      <div id="dit" style="position:absolute;left:420px;top:388px;opacity:0;transition:opacity .4s 1.7s;
           font-size:10px;background:#161b22;border:1px solid #ff7b72;border-radius:5px;padding:4px 7px;z-index:6">
        <span style="color:#ff7b72">▼ Demand</span> 300 TWh/yr
      </div>
    </div>`;

  // Bus node centres (for SVG lines)
  const BUS = {
    de:[422,44], fr:[137,182], ch:[432,212], at:[681,182], it:[447,362]
  };
  // Neighbouring-country NTC connections. Labels are manually offset to avoid overlaps.
  const NTC = [
    ['ch','de',6000,5500,  8,-18], ['ch','fr',4000,3500, -22,-16],
    ['ch','it',5000,4500, 18, 10], ['ch','at',2000,2000,  28,-16],
    ['de','fr',3000,3000, -18,-12], ['de','at',4500,4500,  24,-12],
    ['fr','it',2500,2500, -28, 18], ['at','it',3500,3500,  28, 18]
  ];

  const busIds=['bde','bfr','bch','bat','bit'];
  busIds.forEach((id,i)=>t(()=>$(id)&&($(id).style.opacity='1'),150+i*120));

  t(()=>{
    const sv=document.getElementById('ms');
    if(!sv) return;
    NTC.forEach(([a,b,mw12,mw21,dx,dy])=>{
      const [x1,y1]=BUS[a], [x2,y2]=BUS[b];
      const mx=(x1+x2)/2 + dx, my=(y1+y2)/2 + dy;
      sv.innerHTML+=`
        <line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"
          stroke="#3fb950" stroke-width="2" stroke-dasharray="7 4" opacity=".58"/>
        <rect x="${mx-26}" y="${my-9}" width="52" height="16"
          fill="#0d2a1a" rx="4" opacity=".94"/>
        <text x="${mx}" y="${my+4}" text-anchor="middle"
          font-size="9" fill="#3fb950" font-family="SF Mono,monospace"
          font-weight="600">${(mw12/1000).toFixed(1)} GW</text>`;
    });
  }, 900);

  const genIds=['gde','gfr','gch','gat','git'];
  const demIds=['dde','dfr','dch','dat','dit'];
  genIds.forEach(id=>t(()=>$(id)&&($(id).style.opacity='1'),100));
  demIds.forEach(id=>t(()=>$(id)&&($(id).style.opacity='1'),100));
}},

// 2 — step 1: library + carriers
{ tag:"Step 1 · Library", f(el) {
  el.innerHTML = `
    <h2>Step 0–1 — Schema + Library</h2>
    <div class="sub" style="margin-bottom:10px">The <strong>default library</strong>
      pre-loads 12 canonical energy carriers and 47 technology types
      (ENTSO-E / TYNDP classes) with standard efficiencies and costs.
      We update fuel costs to 2030 values.</div>
    <div class="cb" id="cb">
      <div id="l0"><span class="cm"># Load schema rules + pre-built technology library</span></div>
      <div id="l1">m = <span class="cf">build_model_from_yaml</span>(<span class="cs">"schemas/"</span>)</div>
      <div id="l2">m.<span class="cf">import_library</span>(<span class="cs">"library/default_library"</span>)</div>
      <div id="l3"><span class="cm"># → 12 EnergyCarrier entities now exist (canonical IDs)</span></div>
      <div id="l4"><span class="cm"># → 47 GeneratorType/StorageType entities now exist</span></div>
      <div id="l5">&nbsp;</div>
      <div id="l6"><span class="cm"># Update fuel costs to 2030 assumptions [MU/MWh_fuel]</span></div>
      <div id="l7">m.<span class="cf">add_attribute</span>(<span class="cs">"carrier.fuel.fossil.gas.natural_gas"</span>,</div>
      <div id="l8">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="cs">"energy_carrier_cost"</span>, <span class="cn">30.0</span>)</div>
      <div id="l9">m.<span class="cf">add_attribute</span>(<span class="cs">"carrier.fuel.nuclear.uranium"</span>,</div>
      <div id="l10">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="cs">"energy_carrier_cost"</span>, <span class="cn">3.0</span>)</div>
    </div>
    <div class="boxes" style="max-width:660px;margin-top:12px">
      <div class="box" id="b0"><div class="ic">⚡</div><h3>carrier.electricity</h3><p>CO₂: 0.0 t/MWh</p></div>
      <div class="box" id="b1"><div class="ic">🔥</div><h3>carrier.fuel.fossil.gas...</h3><p>CO₂: 0.205 · cost: 30 MU/MWh</p></div>
      <div class="box" id="b2"><div class="ic">☢️</div><h3>carrier.fuel.nuclear...</h3><p>CO₂: 0.0 · cost: 3 MU/MWh</p></div>

// ── engine ────────────────────────────────────────────────────────────────────
let cur=0;
const stage=document.getElementById('stage');

function $(id){return document.getElementById(id);}
function t(fn,ms){setTimeout(fn,ms);}

// dots
const dotsEl=document.getElementById('dots');
S.forEach((_,i)=>{
  const d=document.createElement('div'); d.className='dot';
  d.addEventListener('click',()=>go(i)); dotsEl.appendChild(d);
});

let curEl=make(0);
function make(i){
  const el=document.createElement('div'); el.className='slide';
  S[i].f(el); stage.appendChild(el); return el;
}

function go(i){
  if(i<0||i>=S.length||i===cur)return;
  const old=curEl;
  old.classList.remove('active'); old.classList.add('exit');
  setTimeout(()=>old.remove(),420);
  cur=i; curEl=make(i);
  requestAnimationFrame(()=>requestAnimationFrame(()=>curEl.classList.add('active')));
  upd();
}

function upd(){
  $('prog-fill').style.width=((cur+1)/S.length*100)+'%';
  $('cnt').textContent=(cur+1)+' / '+S.length;
  $('bp').disabled=cur===0;
  $('bn').disabled=cur===S.length-1;
  $('bn').textContent=cur===S.length-1?'✓ Done':'Next →';
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('a',i===cur));
}

requestAnimationFrame(()=>requestAnimationFrame(()=>curEl.classList.add('active')));
upd();
$('bp').addEventListener('click',()=>go(cur-1));
$('bn').addEventListener('click',()=>{if(cur<S.length-1)go(cur+1);});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' ')go(cur+1);
  if(e.key==='ArrowLeft')go(cur-1);
});
</script>
